# 授权管理系统 - Cloudflare Workers 配置
# 部署文档: https://developers.cloudflare.com/workers/
#
# 首次部署步骤：
#   1. npm install
#   2. npx wrangler d1 create shouquan-db          # 创建 D1 数据库
#   3. 将输出的 database_id 填入下方
#   4. npx wrangler d1 migrations apply shouquan-db  # 执行迁移
#   5. npx wrangler deploy                           # 部署
#
# 本地开发：
#   npm run dev    # wrangler dev --remote（需配置 D1）
#   npm run dev:local  # 需本地 miniflare 支持

name = "shouquan"
main = "src/index.js"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# ===== D1 数据库 =====
# 创建数据库: npx wrangler d1 create shouquan-db
# 将输出的 database_id 复制到下方
[[d1_databases]]
binding = "DB"
database_name = "lequ"
database_id = "af26aefa-1300-4bda-94bc-174b96664236"
preview_database_id = "577571fe-75c8-4c28-8634-49dd0d6fff83"

# ===== 环境变量 =====
# 敏感信息通过 Cloudflare Dashboard 或 Secrets 管理（wrangler secret put）
# Dashboard: Workers & Pages → shouquan → Settings → Variables
# JWT_SECRET / ADMIN_PASSWORD / V1_API_SECRET / V1_API_KEY 须通过 wrangler secret put 设置
[vars]
SITE_NAME = "ShouYinPOS"

# ===== Cron Triggers =====
[triggers]
crons = ["0 * * * *", "0 8 * * *"]

# ===== 路由（自定义域名已通过 Dashboard 绑定） =====
# Worker 域名: www.lequ.pw
# Pages 域名:  api.xiniu.qzz.io

# ===== Pages 集成部署 =====
# admin SPA 部署方式：
#   1. cd admin && npm run build
#   2. npx wrangler pages deploy dist --project-name=shouquan-admin
#   3. 在 Cloudflare Dashboard 中设置自定义域名
#
# web 用户端部署方式：
#   1. cd web && npm run build
#   2. npx wrangler pages deploy dist --project-name=shouquan-web
#   3. 在 Cloudflare Dashboard 中设置自定义域名